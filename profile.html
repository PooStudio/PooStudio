<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile ✦ POOSTUDIO</title>
  <link rel="icon" href="logo.png" type="image/png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IM+Fell+English:ital@0;1&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="profile.css">
</head>
<body>

  <div class="noise-overlay" aria-hidden="true"></div>
  <div id="progress-line"></div>

  <div id="not-auth">
    <div class="not-auth-inner">
      <div class="not-auth-label">403</div>
      <h2 class="not-auth-title">Access Denied</h2>
      <p class="not-auth-body">You need to be signed in to view this page.</p>
      <a href="index.html" class="auth-btn">← Return to Home</a>
    </div>
  </div>

  <div id="content" style="display:none;">

    <nav id="nav">
      <a href="index.html" class="nav-logo">PS</a>
      <div class="nav-right">
        <div class="settings-menu">
          <button class="settings-toggle" id="settings-toggle" aria-label="Settings" aria-expanded="false">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="3"/>
              <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
            </svg>
          </button>

          <div class="settings-dropdown" id="settings-dropdown">
            <div class="dropdown-label">Settings</div>

            <div class="settings-row">
              <label class="settings-row-label">Display Name</label>
              <input type="text" id="settings-display-name" placeholder="New name..." autocomplete="off">
              <button class="settings-action-btn" id="settings-save-name">Save Name</button>
            </div>

            <div class="settings-divider"></div>

            <div class="settings-row">
              <label class="settings-row-label">Profile Picture</label>
              <input type="file" id="settings-avatar-input" accept="image/*">
              <button class="settings-action-btn" id="settings-upload-avatar">Upload Photo</button>
            </div>

            <div class="settings-divider"></div>

            <button class="settings-action-btn settings-action-btn--ghost" onclick="handleVerifyEmail()">Resend Verification</button>
            <button class="settings-action-btn settings-action-btn--ghost" onclick="handleChangePassword()">Change Password</button>

            <div class="settings-divider"></div>

            <button class="settings-action-btn settings-action-btn--danger" onclick="handleLogout()">Sign Out</button>
          </div>
        </div>
      </div>
    </nav>

    <div id="message-container"></div>

    <section id="profile-hero">
      <div class="profile-hero-inner">

        <div class="avatar-wrap">
          <div class="avatar" id="avatar">U</div>
          <button class="avatar-edit" id="edit-avatar" onclick="triggerAvatarUpload()" title="Change photo" aria-label="Change profile photo">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
              <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
            </svg>
          </button>
          <input type="file" id="avatar-input" accept="image/*" style="display:none;">
          <button id="avatar-save-btn" class="avatar-save-btn" style="display:none;">Save Photo</button>
        </div>

        <div class="profile-identity">
          <div class="profile-num">01</div>
          <div class="profile-name-row">
            <h1 class="profile-name" id="display-name">User</h1>
            <button class="inline-edit" onclick="handleChangeName()" aria-label="Edit name">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
                <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
              </svg>
            </button>
          </div>
          <p class="profile-status" id="status"></p>
        </div>

      </div>
    </section>

    <section id="profile-details">
      <div class="section-num">02 — account</div>

      <div class="details-grid">
        <div class="detail-cell">
          <span class="detail-label">Account Created</span>
          <span class="detail-value" id="created-date">—</span>
        </div>
        <div class="detail-cell">
          <span class="detail-label">Email Verified</span>
          <span class="detail-value" id="verified-status">—</span>
        </div>
        <div class="detail-cell">
          <span class="detail-label">Last Sign In</span>
          <span class="detail-value" id="last-login">—</span>
        </div>
      </div>
    </section>

    <footer>
      <div class="footer-left">
        <span class="footer-logo">POOSTUDIO</span>
        <p class="footer-copy">© <span id="year"></span> PooStudio. All rights reserved.</p>
      </div>
      <div class="footer-right">
        <div class="footer-links">
          <a href="terms.html">Terms</a>
          <a href="privacy.html">Privacy</a>
          <a href="index.html">Home</a>
        </div>
      </div>
    </footer>

  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-app.js";
    import {
      getAuth,
      onAuthStateChanged,
      signOut,
      sendEmailVerification,
      updatePassword,
      updateProfile
    } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-auth.js";
    import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-storage.js";
    import { getFirestore, doc, runTransaction, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore.js";

    const app = initializeApp({
      apiKey: "AIzaSyBZuXpjaUPUm3b7QqVtzxEsRhBEESTHu1E",
      authDomain: "poostudios-20da0.firebaseapp.com",
      projectId: "poostudios-20da0",
      storageBucket: "poostudios-20da0.firebasestorage.app",
      messagingSenderId: "69493755317",
      appId: "1:69493755317:web:c1835df7c7b9eae9315dfc"
    });

    const auth = getAuth(app);
    const storage = getStorage(app);
    const db = getFirestore(app);

    const msgContainer = document.getElementById('message-container');

    function showMessage(text, isError = false) {
      const el = document.createElement('div');
      el.className = 'msg-toast' + (isError ? ' msg-toast--error' : '');
      el.textContent = text;
      msgContainer.appendChild(el);
      setTimeout(() => el.remove(), 4500);
    }

    function formatDate(ts) {
      if (!ts) return '—';
      return new Date(ts).toLocaleDateString('en-US', {
        year: 'numeric', month: 'short', day: 'numeric',
        hour: '2-digit', minute: '2-digit'
      });
    }

    function populateProfile(user) {
      const name = user.displayName || 'User';
      document.getElementById('display-name').textContent = name;

      const avatarEl = document.getElementById('avatar');
      if (user.photoURL) {
        avatarEl.innerHTML = `<img src="${user.photoURL}" alt="Profile" style="width:100%;height:100%;border-radius:50%;object-fit:cover;">`;
      } else {
        avatarEl.textContent = (user.displayName || user.email || 'U').charAt(0).toUpperCase();
      }

      const verified = user.emailVerified ? '✓ Verified' : '✗ Not Verified';
      const verEl = document.getElementById('verified-status');
      verEl.textContent = verified;
      verEl.dataset.verified = user.emailVerified;

      const statusEl = document.getElementById('status');
      statusEl.textContent = user.emailVerified ? '✓ Email verified' : '⚠ Email not verified';
      statusEl.dataset.verified = user.emailVerified;

      document.getElementById('created-date').textContent = formatDate(user.metadata?.creationTime);
      document.getElementById('last-login').textContent = formatDate(user.metadata?.lastSignInTime);
      document.getElementById('year').textContent = new Date().getFullYear();
    }

    onAuthStateChanged(auth, (user) => {
      if (user) {
        document.getElementById('not-auth').style.display = 'none';
        document.getElementById('content').style.display = 'block';
        populateProfile(user);
      } else {
        document.getElementById('not-auth').style.display = 'flex';
        document.getElementById('content').style.display = 'none';
      }
    });

    window.handleLogout = async () => {
      try { await signOut(auth); window.location.href = 'index.html'; }
      catch (err) { showMessage('Logout failed: ' + err.message, true); }
    };

    window.handleVerifyEmail = async () => {
      const user = auth.currentUser;
      if (!user) return;
      try { await sendEmailVerification(user); showMessage('Verification email sent.'); }
      catch (err) { showMessage('Failed: ' + (err.message || err.code), true); }
    };

    window.handleChangePassword = async () => {
      const newPw = prompt('New password (min 8 chars):');
      if (!newPw || newPw.length < 8) { showMessage('Password must be at least 8 characters.', true); return; }
      const user = auth.currentUser;
      if (!user) return;
      try {
        await updatePassword(user, newPw);
        showMessage('Password updated. Signing out…');
        setTimeout(() => window.handleLogout(), 2000);
      } catch (err) { showMessage('Failed: ' + (err.message || err.code), true); }
    };

    window.triggerAvatarUpload = () => document.getElementById('avatar-input').click();

    async function uploadAvatarFile(file) {
      const user = auth.currentUser;
      if (!user || !file) return;
      try {
        async function resizeImage(blob, size = 256) {
          const img = await createImageBitmap(blob);
          const canvas = document.createElement('canvas');
          canvas.width = canvas.height = size;
          const ctx = canvas.getContext('2d');
          const min = Math.min(img.width, img.height);
          ctx.drawImage(img, (img.width - min) / 2, (img.height - min) / 2, min, min, 0, 0, size, size);
          return await new Promise(res => canvas.toBlob(res, 'image/jpeg', 0.9));
        }
        const blob = await resizeImage(file, 256);
        const form = new FormData();
        form.append('avatar', blob, 'avatar.jpg');
        form.append('uid', user.uid);
        const endpoint = window.UPLOAD_ENDPOINT || (window.location.origin + '/upload-avatar');
        const resp = await fetch(endpoint, { method: 'POST', body: form });
        if (!resp.ok) throw new Error('upload-failed');
        const data = await resp.json();
        const url = data.url.startsWith('http') ? data.url : new URL(data.url, endpoint).href;
        await updateProfile(user, { photoURL: url });
        populateProfile(user);
        showMessage('Profile photo updated.');
      } catch (err) { showMessage('Failed: ' + (err.message || err.code), true); }
    }

    let pendingAvatar = null;
    const avatarInput = document.getElementById('avatar-input');
    const avatarSaveBtn = document.getElementById('avatar-save-btn');

    avatarInput.addEventListener('change', e => {
      const file = e.target.files[0];
      if (!file) return;
      pendingAvatar = file;
      const reader = new FileReader();
      reader.onload = r => {
        document.getElementById('avatar').innerHTML = `<img src="${r.target.result}" alt="Preview" style="width:100%;height:100%;border-radius:50%;object-fit:cover;">`;
      };
      reader.readAsDataURL(file);
      avatarSaveBtn.style.display = 'block';
    });

    avatarSaveBtn.addEventListener('click', async () => {
      if (!pendingAvatar) return;
      await uploadAvatarFile(pendingAvatar);
      pendingAvatar = null;
      avatarSaveBtn.style.display = 'none';
    });

    const settingsAvatarInput = document.getElementById('settings-avatar-input');
    const settingsUploadBtn = document.getElementById('settings-upload-avatar');
    if (settingsUploadBtn) settingsUploadBtn.addEventListener('click', () => settingsAvatarInput?.click());
    if (settingsAvatarInput) settingsAvatarInput.addEventListener('change', e => {
      const file = e.target.files[0];
      if (file) uploadAvatarFile(file);
    });

    async function claimUsername(user, name) {
      const key = name.toLowerCase();
      const desiredRef = doc(db, 'usernames', key);
      await runTransaction(db, async tx => {
        const snap = await tx.get(desiredRef);
        if (snap.exists() && snap.data().uid !== user.uid) throw new Error('username-taken');
        tx.set(desiredRef, { uid: user.uid, createdAt: serverTimestamp() });
        const old = (user.displayName || '').toLowerCase();
        if (old && old !== key) {
          const oldRef = doc(db, 'usernames', old);
          const oldSnap = await tx.get(oldRef);
          if (oldSnap.exists() && oldSnap.data().uid === user.uid) tx.delete(oldRef);
        }
      });
    }

    window.handleChangeName = async () => {
      const newName = prompt('Enter new display name:');
      if (!newName) return;
      const user = auth.currentUser;
      if (!user) { showMessage('Not authenticated.', true); return; }
      try {
        await claimUsername(user, newName);
        await updateProfile(user, { displayName: newName });
        populateProfile(user);
        showMessage('Display name updated.');
      } catch (err) {
        showMessage(err.message === 'username-taken' ? 'That name is already taken.' : 'Failed: ' + (err.message || err.code), true);
      }
    };

    const settingsSaveNameBtn = document.getElementById('settings-save-name');
    const settingsNameInput = document.getElementById('settings-display-name');
    if (settingsSaveNameBtn) {
      settingsSaveNameBtn.addEventListener('click', async () => {
        const newName = settingsNameInput?.value?.trim();
        if (!newName) { showMessage('Enter a display name.', true); return; }
        const user = auth.currentUser;
        if (!user) { showMessage('Not authenticated.', true); return; }
        try {
          await claimUsername(user, newName);
          await updateProfile(user, { displayName: newName });
          populateProfile(user);
          showMessage('Display name updated.');
          document.getElementById('settings-dropdown').classList.remove('open');
        } catch (err) {
          showMessage(err.message === 'username-taken' ? 'That name is already taken.' : 'Failed: ' + (err.message || err.code), true);
        }
      });
    }

    const settingsToggle = document.getElementById('settings-toggle');
    const settingsDropdown = document.getElementById('settings-dropdown');
    settingsToggle.addEventListener('click', e => {
      e.stopPropagation();
      const open = settingsDropdown.classList.toggle('open');
      settingsToggle.setAttribute('aria-expanded', open);
    });
    document.addEventListener('click', e => {
      if (!settingsToggle.contains(e.target) && !settingsDropdown.contains(e.target)) {
        settingsDropdown.classList.remove('open');
        settingsToggle.setAttribute('aria-expanded', false);
      }
    });
  </script>

  <script>
    window.addEventListener('scroll', () => {
      const pct = window.scrollY / (document.documentElement.scrollHeight - window.innerHeight) * 100;
      document.getElementById('progress-line').style.width = pct + '%';
      document.getElementById('nav')?.classList.toggle('scrolled', window.scrollY > 40);
    });
  </script>

</body>
</html>
